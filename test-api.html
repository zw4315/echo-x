<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo-X API Key 测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #0f0f0f;
      color: #e7e9ea;
    }
    h1 { color: #1d9bf0; }
    .section {
      background: #16181c;
      border: 1px solid #2f3336;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      background: #202327;
      border: 1px solid #2f3336;
      border-radius: 8px;
      color: #e7e9ea;
      box-sizing: border-box;
    }
    button {
      padding: 12px 24px;
      font-size: 14px;
      background: #1d9bf0;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      margin-right: 10px;
    }
    button:hover { background: #1a8cd8; }
    button.secondary {
      background: #2f3336;
    }
    button.secondary:hover {
      background: #3f4346;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success {
      background: rgba(0, 186, 124, 0.1);
      border: 1px solid #00ba7c;
      color: #00ba7c;
    }
    .error {
      background: rgba(244, 33, 46, 0.1);
      border: 1px solid #f4212e;
      color: #f4212e;
    }
    .info {
      background: rgba(29, 155, 240, 0.1);
      border: 1px solid #1d9bf0;
      color: #1d9bf0;
    }
    .hint {
      color: #71767b;
      font-size: 12px;
      margin-top: 5px;
    }
    .log {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 10px;
      max-height: 400px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>🔑 Echo-X API Key 测试工具</h1>
  
  <div class="section">
    <h3>输入 API Key</h3>
    <input type="password" id="apiKey" placeholder="sk-kimi-..." style="margin-bottom: 10px;">
    <div class="hint">
      <label>
        <input type="checkbox" id="showKey"> 显示 Key
      </label>
    </div>
    
    <div style="margin-top: 15px;">
      <button onclick="testModels()">📋 测试获取模型列表</button>
      <button onclick="testChat()" class="secondary">💬 测试对话接口</button>
      <button onclick="clearResult()" class="secondary">🗑️ 清空结果</button>
    </div>
    
    <div id="result"></div>
  </div>

  <div class="section">
    <h3>🔧 可能的问题及解决方案</h3>
    <ul>
      <li><strong>401 Invalid Authentication</strong> - Key 无效、过期或账户欠费。请登录 <a href="https://platform.moonshot.cn/" target="_blank" style="color: #1d9bf0;">Kimi 控制台</a> 检查。</li>
      <li><strong>Failed to fetch / CORS error</strong> - 浏览器跨域限制。这在浏览器扩展中通过 background script 解决。</li>
      <li><strong>429 Too Many Requests</strong> - 请求过于频繁，请稍后再试。</li>
      <li><strong>其他网络错误</strong> - 检查网络连接或代理设置。</li>
    </ul>
  </div>

  <script>
    // 从 URL 参数获取 key（方便从扩展跳转过来）
    const urlParams = new URLSearchParams(window.location.search);
    const keyFromUrl = urlParams.get('key');
    if (keyFromUrl) {
      document.getElementById('apiKey').value = keyFromUrl;
    }

    // 显示/隐藏 key
    document.getElementById('showKey').addEventListener('change', (e) => {
      document.getElementById('apiKey').type = e.target.checked ? 'text' : 'password';
    });

    function showResult(html, type = 'info') {
      document.getElementById('result').innerHTML = `<div class="result ${type}">${html}</div>`;
    }

    function clearResult() {
      document.getElementById('result').innerHTML = '';
    }

    async function testModels() {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        showResult('❌ 请输入 API Key', 'error');
        return;
      }

      showResult('⏳ 正在测试 /v1/models ...', 'info');
      
      const startTime = Date.now();
      
      try {
        const response = await fetch('https://api.moonshot.cn/v1/models', {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${apiKey}`
          }
        });
        
        const text = await response.text();
        const duration = Date.now() - startTime;
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          data = { raw: text };
        }
        
        if (response.ok) {
          const models = data.data?.map(m => m.id) || [];
          showResult(
            `✅ 测试成功！\n\n` +
            `耗时: ${duration}ms\n` +
            `可用模型数: ${models.length}\n` +
            `模型列表:\n${models.join('\n')}`,
            'success'
          );
        } else {
          showResult(
            `❌ 测试失败\n\n` +
            `HTTP 状态: ${response.status}\n` +
            `耗时: ${duration}ms\n\n` +
            `错误详情:\n${JSON.stringify(data, null, 2)}`,
            'error'
          );
        }
      } catch (error) {
        showResult(
          `❌ 请求异常\n\n` +
          `错误: ${error.message}\n\n` +
          `这通常是由于 CORS 限制导致的，在浏览器扩展中需要通过 background script 解决。`,
          'error'
        );
      }
    }

    async function testChat() {
      const apiKey = document.getElementById('apiKey').value.trim();
      if (!apiKey) {
        showResult('❌ 请输入 API Key', 'error');
        return;
      }

      showResult('⏳ 正在测试 /v1/chat/completions ...', 'info');
      
      const startTime = Date.now();
      
      try {
        const response = await fetch('https://api.moonshot.cn/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: 'moonshot-v1-8k',
            messages: [{ role: 'user', content: 'Hello' }],
            max_tokens: 10
          })
        });
        
        const text = await response.text();
        const duration = Date.now() - startTime;
        
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          data = { raw: text };
        }
        
        if (response.ok) {
          const reply = data.choices?.[0]?.message?.content || '无回复';
          showResult(
            `✅ 对话测试成功！\n\n` +
            `耗时: ${duration}ms\n` +
            `模型: ${data.model}\n` +
            `回复: ${reply}\n\n` +
            `完整响应:\n${JSON.stringify(data, null, 2)}`,
            'success'
          );
        } else {
          showResult(
            `❌ 测试失败\n\n` +
            `HTTP 状态: ${response.status}\n` +
            `耗时: ${duration}ms\n\n` +
            `错误详情:\n${JSON.stringify(data, null, 2)}`,
            'error'
          );
        }
      } catch (error) {
        showResult(
          `❌ 请求异常\n\n` +
          `错误: ${error.message}\n\n` +
          `这通常是由于 CORS 限制导致的。`,
          'error'
        );
      }
    }
  </script>
</body>
</html>
