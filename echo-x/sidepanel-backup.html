<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo-X</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- 极简头部 -->
    <header class="header">
      <button id="refreshBtn" class="refresh-btn" title="刷新">⟳</button>
    </header>

    <!-- 调试面板 -->
    <div id="debugPanel" style="display:block; background:#1a1a1a; border:1px solid #333; margin:8px; padding:10px; font-size:11px; font-family:monospace;">
      <div style="color:#888; margin-bottom:5px;">=== 调试信息 ===</div>
      <div id="debugUrl" style="color:#0f0;"></div>
      <div id="debugStatus" style="color:#ff0;"></div>
      <div id="debugError" style="color:#f00;"></div>
      <button id="forceInjectBtn" style="margin-top:8px; padding:4px 8px; background:#333; border:1px solid #555; color:#fff; cursor:pointer;">强制注入 Content Script</button>
      <button id="toggleDebugBtn" style="margin-top:8px; margin-left:5px; padding:4px 8px; background:#333; border:1px solid #555; color:#fff; cursor:pointer;">隐藏调试</button>
    </div>

    <!-- 空状态 -->
    <div id="emptyState" class="empty-state">
      <p>打开 X 帖子页面</p>
      <p id="errorDetail" style="color:#666; font-size:12px; margin-top:8px;"></p>
    </div>

    <!-- 加载状态 -->
    <div id="loadingState" class="loading-state hidden">
      <div class="spinner"></div>
    </div>

    <!-- 主要内容 -->
    <main id="mainContent" class="main-content hidden">
      <!-- 原文 -->
      <section class="section">
        <div class="section-header">
          <h2>原文</h2>
          <button id="copyOriginalBtn" class="text-btn">复制</button>
        </div>
        <div class="content-card">
          <p id="originalText" class="original-text"></p>
          <div id="postImages" class="post-images"></div>
        </div>
      </section>

      <!-- 翻译 -->
      <section class="section">
        <div class="section-header">
          <h2>翻译</h2>
          <button id="copyTranslationBtn" class="text-btn">复制</button>
        </div>
        <div class="content-card">
          <p id="translationText" class="translation-text"></p>
        </div>
      </section>

      <!-- 分词 -->
      <section class="section">
        <div class="section-header">
          <h2>分词</h2>
        </div>
        <div class="content-card">
          <div id="tokenization" class="tokenization"></div>
        </div>
      </section>

      <!-- 生词 -->
      <section class="section">
        <div class="section-header">
          <h2>生词</h2>
          <span class="badge" id="vocabCount">0</span>
        </div>
        <div class="content-card">
          <div id="vocabulary" class="vocabulary-list"></div>
        </div>
      </section>

      <!-- 语法点 -->
      <section class="section">
        <div class="section-header">
          <h2>语法</h2>
        </div>
        <div class="content-card">
          <div id="grammar" class="grammar-list"></div>
        </div>
      </section>

      <!-- 例句 -->
      <section class="section">
        <div class="section-header">
          <h2>例句</h2>
        </div>
        <div class="content-card">
          <div id="examples" class="examples-list"></div>
        </div>
      </section>

      <!-- 回复助手 -->
      <section class="section reply-section">
        <div class="section-header">
          <h2>回复助手</h2>
        </div>
        <div class="reply-container">
          <div class="reply-options">
            <button class="reply-tone-btn active" data-tone="friendly">友好</button>
            <button class="reply-tone-btn" data-tone="casual">随意</button>
            <button class="reply-tone-btn" data-tone="formal">正式</button>
            <button class="reply-tone-btn" data-tone="agree">赞同</button>
          </div>
          
          <div class="reply-input-area">
            <textarea 
              id="replyInput" 
              class="reply-input" 
              placeholder="输入回复要点..."
              rows="2"
            ></textarea>
            <div class="reply-actions">
              <button id="generateReplyBtn" class="generate-btn">生成</button>
            </div>
          </div>
          
          <div id="generatedReplies" class="generated-replies"></div>
        </div>
      </section>

      <div class="bottom-spacer"></div>
    </main>

    <!-- 设置面板 (按 Alt+S 打开) -->
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <button id="closeSettings" class="icon-btn">←</button>
        <h3>设置</h3>
      </div>
      
      <div class="settings-content">
        <div class="setting-item">
          <label>API</label>
          <select id="apiProvider">
            <option value="openai">OpenAI</option>
            <option value="kimi">Kimi</option>
          </select>
        </div>

        <div class="setting-item">
          <label>API Key</label>
          <input type="password" id="apiKey" placeholder="sk-...">
        </div>

        <div class="setting-item">
          <label>模型</label>
          <select id="aiModel">
            <option value="gpt-4o-mini">GPT-4o Mini</option>
            <option value="moonshot-v1-8k">Moonshot v1 8k</option>
          </select>
        </div>

        <button id="saveSettings" class="primary-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- 内联测试脚本 -->
  <script>
    console.log('[Echo-X] HTML loaded');
    document.getElementById('debugUrl').textContent = 'JS 运行中...';
    
    window.onerror = function(msg, url, line) {
      document.getElementById('debugError').textContent = 'ERROR: ' + msg + ' at line ' + line;
      console.error('[Echo-X] Runtime error:', msg, url, line);
      return false;
    };
  </script>
  <script src="sidepanel.js"></script>
  <script>
    console.log('[Echo-X] sidepanel.js loaded');
    document.getElementById('debugStatus').textContent = 'sidepanel.js 加载完成';
  </script>
</body>
</html>
