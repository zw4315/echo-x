<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo-X</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <button id="refreshBtn" class="refresh-btn" title="刷新">⟳</button>
    </header>

    <div id="debugPanel" style="background:#1a1a1a; border:1px solid #333; margin:8px; padding:10px; font-size:11px; font-family:monospace;">
      <div style="color:#888; margin-bottom:5px;">=== 调试信息 ===</div>
      <div id="debugUrl" style="color:#0f0;">加载中...</div>
      <div id="debugStatus" style="color:#ff0;"></div>
      <div id="debugError" style="color:#f00;"></div>
      <button id="forceInjectBtn" style="margin-top:8px; padding:4px 8px; background:#333; border:1px solid #555; color:#fff; cursor:pointer;">强制注入</button>
    </div>

    <div id="emptyState" class="empty-state">
      <p>打开 X 帖子页面</p>
    </div>

    <main id="mainContent" class="main-content hidden">
      <section class="section">
        <div class="section-header">
          <h2>原文</h2>
          <button id="copyOriginalBtn" class="text-btn">复制</button>
        </div>
        <div class="content-card">
          <p id="originalText" class="original-text" style="white-space:pre-wrap; line-height:1.6;"></p>
        </div>
      </section>
    </main>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
